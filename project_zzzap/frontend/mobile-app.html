<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zzzap! ⚡️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
            padding-bottom: 70px; /* Bottom nav space */
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            padding: 8px;
            cursor: pointer;
        }

        /* Feed */
        .feed {
            margin-top: 60px;
        }

        .video-card {
            position: relative;
            width: 100%;
            height: 70vh;
            background: #111;
            margin-bottom: 2px;
        }

        .video-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            font-size: 48px;
        }

        .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .product-price {
            font-size: 20px;
            font-weight: 700;
            color: #00ffff;
            margin-bottom: 8px;
        }

        .seller-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #888;
        }

        .seller-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #333;
        }

        .gold-badge {
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
        }

        /* Right side actions */
        .card-actions {
            position: absolute;
            right: 12px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .action-btn {
            background: rgba(0,0,0,0.5);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .action-count {
            font-size: 11px;
            margin-top: 4px;
            color: #fff;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #666;
            font-size: 10px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 16px;
        }

        .nav-item.active {
            color: #00ffff;
        }

        .nav-icon {
            font-size: 24px;
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            border: none;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,255,255,0.4);
            z-index: 99;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #666;
        }

        /* Chat indicator */
        .chat-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ff0055;
            color: #fff;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 10px;
            font-weight: 700;
        }

        .chat-icon-wrapper {
            position: relative;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="logo">ZZZAP!</div>
        <div class="header-actions">
            <button class="icon-btn">🔍</button>
            <div class="chat-icon-wrapper">
                <button class="icon-btn">💬</button>
                <span class="chat-badge">2</span>
            </div>
        </div>
    </header>

    <!-- Video Feed -->
    <main class="feed" id="feed">
        <!-- Cards will be loaded dynamically -->
    </main>

    <!-- Floating Action Button -->
    <button class="fab" onclick="alert('Создать товар')">+</button>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active">
            <span class="nav-icon">🏠</span>
            <span>Главная</span>
        </button>
        <button class="nav-item">
            <span class="nav-icon">🔥</span>
            <span>Тренды</span>
        </button>
        <button class="nav-item">
            <span class="nav-icon">📦</span>
            <span>Заказы</span>
        </button>
        <button class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Профиль</span>
        </button>
    </nav>

    <script>
        // Mock data for feed
        const products = [
            {
                id: 1,
                title: 'iPhone 15 Pro Max 256GB',
                price: 650000,
                seller: 'apple_store_kz',
                avatar: '🍎',
                isGold: true,
                likes: 89,
                views: 1234,
                emoji: '📱'
            },
            {
                id: 2,
                title: 'Nike Air Jordan 1 Original',
                price: 85000,
                seller: 'sneaker_kz',
                avatar: '👟',
                isGold: false,
                likes: 45,
                views: 567,
                emoji: '👟'
            },
            {
                id: 3,
                title: 'MacBook Pro M3 14"',
                price: 950000,
                seller: 'tech_store',
                avatar: '💻',
                isGold: true,
                likes: 156,
                views: 2341,
                emoji: '💻'
            }
        ];

        // Render feed
        function renderFeed() {
            const feed = document.getElementById('feed');
            feed.innerHTML = products.map(product => `
                <div class="video-card">
                    <div class="video-placeholder">${product.emoji}</div>
                    
                    <div class="card-actions">
                        <div>
                            <button class="action-btn">❤️</button>
                            <div class="action-count">${product.likes}</div>
                        </div>
                        <div>
                            <button class="action-btn">💬</button>
                            <div class="action-count">${Math.floor(product.likes/3)}</div>
                        </div>
                        <div>
                            <button class="action-btn">🔗</button>
                            <div class="action-count">Share</div>
                        </div>
                    </div>
                    
                    <div class="card-overlay">
                        <div class="product-title">${product.title}</div>
                        <div class="product-price">${product.price.toLocaleString()} ₸</div>
                        <div class="seller-info">
                            <div class="seller-avatar">${product.avatar}</div>
                            <span>${product.seller}</span>
                            ${product.isGold ? '<span class="gold-badge">GOLD</span>' : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Initialize
        renderFeed();

        // Bottom nav interaction
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // API Health Check
        fetch('/api/v1/health')
            .then(r => r.json())
            .then(data => console.log('API Status:', data.status))
            .catch(e => console.log('API not available yet'));
    </script>
</body>
</html>
